<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教师端 - 智能教学助手</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
  <nav class="nav">
    <h1>教师端 · 智能教学助手</h1>
    <a href="index.html">返回首页</a>
  </nav>
  <main class="main">
    <div id="workspace-warn" class="result error" style="display:none; margin-bottom:16px;"></div>
    <div class="teacher-grid">
      <!-- 学情数据看板 - 仅设计 -->
      <section class="panel design-only" style="grid-column: span 2;">
        <h3>学情数据看板</h3>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;">
          <div class="placeholder-box" style="min-height:80px;">今日活跃学生<br><strong>--</strong></div>
          <div class="placeholder-box" style="min-height:80px;">待批改作业<br><strong>--</strong></div>
          <div class="placeholder-box" style="min-height:80px;">预警人数<br><strong>--</strong></div>
          <div class="placeholder-box" style="min-height:80px;">平均掌握率<br><strong>--</strong></div>
        </div>
      </section>

      <!-- 智能出题组卷 - 实际对接 4 项 -->
      <section class="panel">
        <h3>自测题生成</h3>
        <div class="form-row">
          <label>课程</label>
          <select id="quiz-course">
            <option value="人工智能引论">人工智能引论</option>
            <option value="Python程序设计">Python程序设计</option>
            <option value="操作系统原理与技术实现">操作系统原理与技术实现</option>
            <option value="数据结构">数据结构</option>
          </select>
        </div>
        <div class="form-row">
          <label>章节</label>
          <input type="text" id="quiz-chapter" placeholder="如 3" value="3">
        </div>
        <button class="btn btn-block" id="btn-quiz">生成自测题</button>
        <div id="result-quiz" class="result" style="display:none;"></div>
      </section>

      <section class="panel">
        <h3>AB 卷生成</h3>
        <div class="form-row">
          <label>课程</label>
          <select id="exam-course">
            <option value="人工智能引论">人工智能引论</option>
            <option value="Python程序设计">Python程序设计</option>
            <option value="操作系统原理与技术实现">操作系统原理与技术实现</option>
            <option value="数据结构">数据结构</option>
          </select>
        </div>
        <div class="form-row">
          <label>考试类型</label>
          <select id="exam-type">
            <option value="期末">期末</option>
            <option value="期中">期中</option>
            <option value="单元测试">单元测试</option>
          </select>
        </div>
        <div class="form-row">
          <label>章节范围（可选）</label>
          <input type="text" id="exam-chapters" placeholder="如 1-5 或 1,3,5">
        </div>
        <button class="btn btn-block" id="btn-exam">生成 AB 卷</button>
        <div id="result-exam" class="result" style="display:none;"></div>
      </section>

      <section class="panel">
        <h3>实验方案生成</h3>
        <div class="form-row">
          <label>课程</label>
          <select id="exp-course">
            <option value="人工智能引论">人工智能引论</option>
            <option value="Python程序设计">Python程序设计</option>
            <option value="操作系统原理与技术实现">操作系统原理与技术实现</option>
            <option value="数据结构">数据结构</option>
          </select>
        </div>
        <div class="form-row">
          <label>章节</label>
          <input type="text" id="exp-chapter" placeholder="如 3" value="3">
        </div>
        <div class="form-row">
          <label>难度（可选）</label>
          <select id="exp-difficulty">
            <option value="">默认</option>
            <option value="基础">基础</option>
            <option value="进阶">进阶</option>
            <option value="挑战">挑战</option>
          </select>
        </div>
        <button class="btn btn-block" id="btn-exp">生成实验方案</button>
        <div id="result-exp" class="result" style="display:none;"></div>
      </section>

      <section class="panel">
        <h3>PPT 生成</h3>
        <div class="form-row">
          <label>PPT 主题（课程 + 章节/主题）</label>
          <input type="text" id="ppt-query" placeholder="如：人工智能引论 第3章 搜索与问题求解" value="人工智能引论 第3章 搜索与问题求解">
        </div>
        <button class="btn btn-block" id="btn-ppt">生成 PPT</button>
        <div id="result-ppt" class="result" style="display:none;"></div>
      </section>

      <!-- 作业管理与自动批改 - 仅设计 -->
      <section class="panel design-only" style="grid-column: span 2;">
        <h3>作业管理与自动批改</h3>
        <div class="placeholder-box large">作业列表、批改状态、自动批改结果（界面预留，待后端对接）</div>
      </section>

      <!-- 学生学习状态预警 - 仅设计 -->
      <section class="panel design-only">
        <h3>学生学习状态预警列表</h3>
        <div class="placeholder-box" style="min-height:160px;">预警学生、风险等级、建议（界面预留）</div>
      </section>

      <!-- 班级知识点掌握统计 - 仅设计 -->
      <section class="panel design-only">
        <h3>班级知识点掌握统计</h3>
        <div class="placeholder-box" style="min-height:160px;">知识点掌握率、雷达图/柱状图（界面预留）</div>
      </section>
    </div>
  </main>
  <script src="js/teacher.js"></script>
</body>
</html>
